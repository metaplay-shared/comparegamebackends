name: Neutrality check

# Fails a PR if banned marketing / AI-tell language appears in newly added
# comparison data — including the automated weekly freshness PRs. No secrets required.
#
# Runs on EVERY PR (no path filter) so it can be a required status check without
# stranding PRs that don't touch the data files: the script diffs only the data
# files, so a PR that doesn't change them produces an empty diff and passes instantly.
on:
  pull_request:

jobs:
  neutrality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check for banned marketing / AI-tell language
        run: node scripts/check-neutrality.mjs "origin/${{ github.base_ref }}"
