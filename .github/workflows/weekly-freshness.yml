name: Weekly freshness sweep

# Every Friday, ask Claude to check each platform's official docs/pricing/changelog
# for MATERIAL changes since its last update, draft neutral + sourced edits to the
# comparison data, and open a DRAFT pull request for a maintainer to review.
#
# It never merges. The PR must pass the neutrality check + lint/build like any other.
#
# ── ONE-TIME SETUP (no secret is ever stored in this repo) ────────────────────────
# The Anthropic API key is pulled from Vault at runtime via GitHub OIDC, so nothing
# sensitive is committed or kept as a GitHub Actions secret. Infra must configure:
#   1. A Vault JWT/OIDC auth role (e.g. "comparegamebackends-ci") bound to this repo
#      (sub = repo:metaplay-shared/comparegamebackends:*) with a policy granting read
#      on the Anthropic key path.
#   2. Repo variables (Settings → Variables, NOT secrets — these are non-sensitive):
#        VAULT_ADDR          e.g. https://vault.example:8200
#        VAULT_ANTHROPIC_PATH  the kv path holding the key, e.g. secret/data/comparegamebackends
#   3. Vault must be reachable from GitHub-hosted runners. If Vault is internal-only,
#      run this workflow on a self-hosted runner inside the network (and gate fork PRs),
#      or run the equivalent job from internal infra and open the PR remotely.
# Trigger a first run manually (workflow_dispatch) to validate auth + web access.

on:
  schedule:
    - cron: '0 9 * * 5' # Fridays 09:00 UTC
  workflow_dispatch: {} # manual trigger for testing / on-demand sweeps

concurrency:
  group: weekly-freshness
  cancel-in-progress: false

permissions:
  contents: write # commit the draft branch
  pull-requests: write # open the draft PR
  id-token: write # GitHub OIDC token for Vault auth

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Current month (for lastUpdated)
        id: date
        run: echo "ym=$(date +'%Y-%m')" >> "$GITHUB_OUTPUT"

      - name: Fetch Anthropic API key from Vault (OIDC)
        id: vault
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3
        with:
          url: ${{ vars.VAULT_ADDR }}
          method: jwt
          role: comparegamebackends-ci
          # Adjust the path/field to match your Vault layout (set via VAULT_ANTHROPIC_PATH).
          secrets: |
            ${{ vars.VAULT_ANTHROPIC_PATH }} ANTHROPIC_API_KEY | anthropic_api_key

      - name: Create working branch
        run: git checkout -b freshness/${{ github.run_id }}

      - name: Claude — check providers and draft neutral updates
        uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d # v1
        with:
          anthropic_api_key: ${{ steps.vault.outputs.anthropic_api_key }}
          claude_args: "--max-turns 40 --model claude-sonnet-4-6 --allowedTools WebSearch,WebFetch,Bash,Read,Edit,Write,Glob,Grep"
          prompt: |
            You are doing the weekly freshness check for comparegamebackends.com, a NEUTRAL,
            community-maintained comparison of game backend platforms. Today's month is ${{ steps.date.outputs.ym }}.

            FIRST, read CONTRIBUTING.md — it is the binding rubric. Then read the data files:
            lib/backends.ts, lib/architecture.ts, lib/ai-capabilities.ts. These cover 8 platforms:
            Metaplay, PlayFab, Heroic Labs, AWS GameLift, Unity Gaming Services, Colyseus, brainCloud, AccelByte.

            For EACH platform, use WebSearch / WebFetch (or curl via Bash) to check its OFFICIAL
            docs, pricing, and changelog/blog for MATERIAL changes since that entry's `lastUpdated`
            (e.g. new pricing, renamed/retired products, newly shipped features, AI changes).

            Where — and only where — you can VERIFY a material change against an official source:
              - Update the relevant field(s) in the data files.
              - Update or add the `sourceUrl` to the official page that backs the change.
              - Bump that platform's `lastUpdated` to "${{ steps.date.outputs.ym }}".

            STRICT RULES (the PR is auto-rejected otherwise):
              - Neutral, factual tone. NO marketing superlatives, NO AI-tell words
                (delve, crucial, landscape, leverage, seamless, revolutionary, cutting-edge, etc.).
              - Every claim must cite an official source. Do NOT invent or guess. If you cannot
                verify a change, leave the entry untouched.
              - Acknowledge competitor strengths fairly; never skew toward Metaplay.
              - Edit ONLY lib/backends.ts, lib/architecture.ts, lib/ai-capabilities.ts.
              - Do NOT commit or push — the workflow handles that.

            If nothing material changed for any platform, make NO edits. A no-op week is a valid,
            expected outcome — do not invent changes to look busy.

      - name: Commit, push, and open a draft PR if anything changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Weekly freshness sweep (${{ steps.date.outputs.ym }})"
          fi
          if [ -z "$(git log origin/main..HEAD --oneline)" ]; then
            echo "No material changes this week — nothing to propose."
            exit 0
          fi
          git push origin HEAD
          gh pr create --draft \
            --base main --head "freshness/${{ github.run_id }}" \
            --title "Weekly freshness sweep (${{ steps.date.outputs.ym }})" \
            --body "Automated weekly check of each platform's official docs/pricing/changelog for material changes.

          Every edit should be sourced and neutral. This PR must pass the neutrality check + lint/build before merge. **Review each change against its source**, then merge if correct or close if not.

          🤖 Drafted by the weekly freshness workflow. Not auto-merged."
