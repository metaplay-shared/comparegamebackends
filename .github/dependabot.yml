# Keeps the SHA-pinned GitHub Actions (and npm deps) current and patched.
# Dependabot opens PRs to bump the pins; they go through the same CI + review.
#
# Tuned for low noise: monthly, GROUPED into a single PR per ecosystem, and capped
# at one open PR each. So at most ~2 PRs/month (one actions, one npm) instead of a
# burst of one-per-dependency. Bump cadence/grouping here if that's too quiet.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns: ["*"]
    open-pull-requests-limit: 1
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      npm-all:
        patterns: ["*"]
    open-pull-requests-limit: 1
